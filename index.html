<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jain Store – Nazai Bazar,Lalitpur</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --g: #0c831f; --g2: #107826; --y: #f8c200; --y2: #ffd000; --r: #8B1A1A;
  --bg: #f2f2f2; --white: #fff; --card: #fff; --text: #1a1a1a;
  --muted: #666; --border: #e8e8e8; --radius: 12px;
  font-family: 'Nunito', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; }

#login-screen { position: fixed; inset: 0; background: var(--white); z-index: 9999; display: flex; flex-direction: column; }
.login-hero { background: linear-gradient(160deg, #0c831f 60%, #f8c200 100%); padding: 48px 30px; text-align: center; color: #fff; }
.login-logo { font-size: 42px; font-weight: 900; }
.login-form-wrap { padding: 40px 24px; display: flex; flex-direction: column; gap: 14px; }
.inp { width: 100%; padding: 14px; border: 2px solid var(--border); border-radius: var(--radius); outline: none; }
.login-btn { background: var(--g); color: #fff; border: none; border-radius: var(--radius); padding: 15px; font-weight: 800; cursor: pointer; }

#app { display: none; padding-bottom: 80px; }
.topbar { background: var(--g); padding: 12px 16px; position: sticky; top: 0; z-index: 500; display: flex; justify-content: space-between; align-items: center; color: #fff; }
.cart-btn { background: var(--y); border: none; padding: 8px 16px; border-radius: 50px; font-weight: 900; cursor: pointer; }

.prod-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 16px; }
.prod-card { background: #fff; border-radius: var(--radius); border: 1px solid var(--border); padding: 10px; position: relative; }
.add-btn { background: #fff; color: var(--g); border: 2px solid var(--g); border-radius: 8px; padding: 5px 15px; font-weight: 800; cursor: pointer; }

/* Fixed IDs and Classes */
.order-card { background: #fff; border: 1px solid var(--border); border-radius: 14px; margin: 12px 16px; padding: 16px; border-left: 5px solid var(--g); }
.order-header { display: flex; justify-content: space-between; font-weight: 900; margin-bottom: 5px; }

.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid var(--border); display: flex; z-index: 500; }
.nav-tab { flex: 1; text-align: center; padding: 12px 0; cursor: pointer; font-size: 12px; font-weight: 800; color: var(--muted); }
.nav-tab.active { color: var(--g); }

.page { display: none; }
.page.active { display: block; }
.drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 600; display: none; }
.cart-drawer { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; z-index: 700; border-radius: 20px 20px 0 0; display: none; flex-direction: column; padding: 20px; }
.cart-drawer.open, .drawer-overlay.open { display: flex; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-hero"><div class="login-logo">Jain Store</div></div>
  <div class="login-form-wrap">
    <input class="inp" id="cust-name" type="text" placeholder="👤 आपका नाम">
    <input class="inp" id="cust-phone" type="tel" placeholder="📞 मोबाइल नंबर">
    <button class="login-btn" onclick="loginMe()">🛒 प्रवेश करें</button>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div style="font-weight:900; font-size:20px;">Jain Store</div>
    <button class="cart-btn" onclick="openCart()">🛒 <span id="cart-count">0</span></button>
  </div>

  <div class="page active" id="page-home">
    <div class="prod-grid" id="p-grid"></div>
  </div>

  <div class="page" id="page-orders">
    <div style="padding:16px; font-weight:900; font-size:18px;">📦 My Orders</div>
    <div id="order-list"></div> </div>

  <div class="page" id="page-profile">
    <div style="text-align:center; padding:40px 20px; background:var(--g); color:#fff;">
      <h2 id="p-name"></h2>
      <p id="p-phone"></p>
      <button onclick="logout()" style="margin-top:20px; padding:10px 20px; border-radius:8px; border:none; background:var(--r); color:#fff; font-weight:800;">Logout</button>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-tab active" id="nav-home" onclick="showPage('home')">🏠 Home</div>
    <div class="nav-tab" id="nav-orders" onclick="showPage('orders'); loadOrders();">📦 Orders</div> <div class="nav-tab" id="nav-profile" onclick="showPage('profile')">👤 Profile</div>
  </div>
</div>

<div class="drawer-overlay" id="drawer-overlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cart-drawer">
  <h3 style="margin-bottom:15px;">🛒 Cart Items</h3>
  <div id="cart-items-list" style="max-height:300px; overflow-y:auto;"></div>
  <div style="margin-top:15px; border-top:1px solid #eee; padding-top:10px;">
    <div style="display:flex; justify-content:space-between; font-weight:900; font-size:18px;">
      <span>Total Bill:</span><span id="bill-total">₹0</span>
    </div>
    <textarea id="addr" style="width:100%; margin-top:10px; padding:10px; border-radius:8px; border:1px solid #ddd;" placeholder="Delivery Address..."></textarea>
    <button onclick="sendWA()" style="width:100%; background:#25D366; color:#fff; border:none; padding:15px; border-radius:10px; margin-top:10px; font-weight:900; cursor:pointer;">WhatsApp पर Order भेजें</button>
  </div>
</div>

<script>
const SHOP_WA = "919260903360";
let cart = {}; 
let currentUser = null;

const products = [
  {id:1, name:'Premium Kaju', price:200, unit:'250g', img:'https://images.unsplash.com/photo-1596040033229-a9821ebd058d?w=400'},
  {id:2, name:'Special Badam', price:300, unit:'250g', img:'https://images.unsplash.com/photo-1599940824399-b87987ceb72a?w=400'},
  {id:3, name:'Lal Mirch Powder', price:55, unit:'200g', img:'https://images.unsplash.com/photo-1615485290382-441e4d049cb5?w=400'},
  {id:4, name:'Pure Ghee', price:550, unit:'500ml', img:'https://images.unsplash.com/photo-1615485541147-1131185bb9b9?w=400'}
];

function loginMe() {
  const n = document.getElementById('cust-name').value.trim();
  const p = document.getElementById('cust-phone').value.trim();
  if(!n || p.length < 10) return alert('Naam aur 10 digit number daalein!');
  const u = { n, p };
  localStorage.setItem('jainUser', JSON.stringify(u));
  initApp(u);
}

function initApp(u) {
  currentUser = u;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('p-name').textContent = u.n;
  document.getElementById('p-phone').textContent = u.p;
  renderProducts();
}

function renderProducts() {
  const grid = document.getElementById('p-grid');
  grid.innerHTML = products.map(p => {
    const qty = cart[p.id] || 0;
    return `<div class="prod-card">
      <img src="${p.img}" style="width:100%; height:100px; object-fit:cover; border-radius:8px;">
      <div style="font-weight:800; margin:8px 0; font-size:14px;">${p.name}</div>
      <div style="font-size:12px; color:#666;">${p.unit} - ₹${p.price}</div>
      <div style="margin-top:10px; display:flex; justify-content:center;">
        ${qty === 0 ? `<button class="add-btn" onclick="addItem(${p.id})">Add</button>` : 
        `<div style="background:var(--g); color:#fff; border-radius:5px; display:flex; align-items:center;">
          <button onclick="removeItem(${p.id})" style="background:none; border:none; color:#fff; padding:5px 10px; cursor:pointer;">-</button>
          <span style="padding:0 5px;">${qty}</span>
          <button onclick="addItem(${p.id})" style="background:none; border:none; color:#fff; padding:5px 10px; cursor:pointer;">+</button>
        </div>`}
      </div>
    </div>`;
  }).join('');
}

function addItem(id) { cart[id] = (cart[id] || 0) + 1; updateUI(); }
function removeItem(id) { if(cart[id]) cart[id]--; if(cart[id] === 0) delete cart[id]; updateUI(); }
function updateUI() {
  renderProducts();
  document.getElementById('cart-count').textContent = Object.values(cart).reduce((a,b)=>a+b,0);
}

function openCart() {
  if(Object.keys(cart).length === 0) return alert("Cart khali hai!");
  renderCart();
  document.getElementById('cart-drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
}
function closeCart() { document.getElementById('cart-drawer').classList.remove('open'); document.getElementById('drawer-overlay').classList.remove('open'); }

function renderCart() {
  let total = 0;
  const list = Object.keys(cart).map(id => {
    const p = products.find(x => x.id == id);
    total += p.price * cart[id];
    return `<div style="display:flex; justify-content:space-between; margin-bottom:10px;">
      <span>${p.name} x ${cart[id]}</span><span>₹${p.price * cart[id]}</span>
    </div>`;
  }).join('');
  document.getElementById('cart-items-list').innerHTML = list;
  document.getElementById('bill-total').textContent = '₹' + total;
}

function sendWA() {
  const addr = document.getElementById('addr').value.trim();
  if(!addr) return alert("Address likhein!");
  
  let total = 0;
  let itemsStr = "";
  Object.keys(cart).forEach(id => {
    const p = products.find(x => x.id == id);
    itemsStr += `${p.name} (${p.unit}) x ${cart[id]}, `;
    total += p.price * cart[id];
  });

  const orderId = 'ORD' + Date.now();
  const orderData = { id: orderId, date: new Date().toLocaleString(), items: itemsStr, total: total, phone: currentUser.p, addr: addr };

  const orders = JSON.parse(localStorage.getItem('jainOrders') || '[]');
  orders.push(orderData);
  localStorage.setItem('jainOrders', JSON.stringify(orders));

  const msg = `*Order from Jain Store*\nID: ${orderId}\nName: ${currentUser.n}\nItems: ${itemsStr}\nTotal: ₹${total}\nAddr: ${addr}`;
  window.open(`https://wa.me/${SHOP_WA}?text=${encodeURIComponent(msg)}`);
  cart = {}; updateUI(); closeCart();
}

function loadOrders() {
  const el = document.getElementById('order-list');
  const user = JSON.parse(localStorage.getItem('jainUser') || '{}');
  const orders = JSON.parse(localStorage.getItem('jainOrders') || '[]');
  const mine = orders.filter(o => o.phone === user.p);

  if(mine.length === 0) { el.innerHTML = "<p style='text-align:center; padding:20px;'>No orders yet.</p>"; return; }

  el.innerHTML = mine.map(o => `
    <div class="order-card">
      <div class="order-header"><span>🆔 ${o.id}</span><span>₹${o.total}</span></div>
      <div style="font-size:12px; color:#666;">📅 ${o.date}</div>
      <div style="font-size:13px; margin:8px 0;">📦 ${o.items}</div>
      <button onclick="downloadInvoice('${o.id}')" style="width:100%; background:var(--g); color:#fff; border:none; padding:8px; border-radius:8px; font-weight:700; cursor:pointer;">Download Invoice</button>
    </div>
  `).join('');
}

function downloadInvoice(orderId) {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const orders = JSON.parse(localStorage.getItem('jainOrders') || '[]');
  const o = orders.find(x => x.id === orderId);
  if(!o) return;

  doc.setTextColor(12, 131, 31);
  doc.setFontSize(22);
  doc.text("JAIN STORE LALITPUR", 14, 20);
  doc.setTextColor(0, 0, 0);
  doc.setFontSize(10);
  doc.text(`Invoice No: ${o.id}`, 14, 30);
  doc.text(`Date: ${o.date}`, 14, 35);
  
  doc.autoTable({
    startY: 45,
    head: [['Description', 'Total']],
    body: [[o.items, 'Rs. ' + o.total]],
    theme: 'grid',
    headStyles: { fillColor: [12, 131, 31] }
  });
  doc.save(`Invoice_${o.id}.pdf`);
}

function showPage(pg) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+pg).classList.add('active');
  document.getElementById('nav-'+pg).classList.add('active');
}

function logout() { localStorage.removeItem('jainUser'); location.reload(); }

window.onload = () => {
  const saved = localStorage.getItem('jainUser');
  if(saved) initApp(JSON.parse(saved));
};
</script>
</body>
</html>
```
